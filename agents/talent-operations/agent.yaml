spec_version: "0.1.0"
name: talent-operations-agent
version: 1.0.0
description: >
  Handles operational recruitment tasks: requisition approvals, job posting
  management, internal mobility, offboarding, immigration tracking, and
  cross-functional coordination between hiring and HR workflows.

model:
  preferred: claude-sonnet-4-5-20250929
  constraints:
    temperature: 0.2
    max_tokens: 4096

skills:
  - requisition-approval
  - internal-mobility
  - offboarding-workflow
  - job-description-optimizer
  - candidate-rediscovery

tools:
  - lever-ats
  - job-board-poster
  - hris-integration
  - slack-notifier
  - immigration-tracker

runtime:
  max_turns: 30
  timeout: 180
