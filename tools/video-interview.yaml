name: video-interview
description: >
  Manages video interview sessions via Zoom/Teams. Creates meeting links,
  sends invites, records sessions, and generates transcripts for review.
input_schema:
  type: object
  properties:
    action:
      type: string
      enum:
        - create_meeting
        - cancel_meeting
        - reschedule_meeting
        - get_recording
        - get_transcript
        - get_meeting_status
        - send_invite
      description: Video interview operation
    platform:
      type: string
      enum:
        - zoom
        - teams
        - google_meet
      description: Video platform
    host_email:
      type: string
      description: Interviewer/host email
    participant_emails:
      type: array
      items:
        type: string
      description: Participant email addresses
    datetime:
      type: string
      format: date-time
      description: Meeting time (ISO 8601, ET)
    duration_minutes:
      type: integer
      enum: [30, 45, 60, 90]
      description: Meeting duration
    meeting_title:
      type: string
      description: Meeting title (e.g., "Technical Interview - Jane Doe - Sr. Engineer")
    record:
      type: boolean
      description: Whether to record the session (default true)
    meeting_id:
      type: string
      description: Existing meeting ID for cancel/reschedule/recording queries
    interview_type:
      type: string
      enum:
        - phone_screen
        - technical
        - behavioral
        - panel
        - hiring_manager
        - executive
      description: Interview stage for labeling
  required:
    - action
